name: Generate Activity Graph

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate Activity Graph
        uses: Ashutosh00710/github-readme-activity-graph@v1.4.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
